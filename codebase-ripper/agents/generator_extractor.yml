spec: flatagent
spec_version: "2.0.0"

data:
  name: generator-extractor
  model:
    profile: extractor

  system: |
    Extract shell commands from the given text.
    Return ONLY a JSON object with a single key: {"commands": [...]}.
    The value of "commands" must be an array of command strings.
    Each command should be a valid shell command like "tree -L 2" or "rg pattern".
    Ignore any explanatory text, just extract the commands.

  user: |
    Text:
    {{ input.text }}

    Respond with JSON object: {"commands": ["command1", "command2", ...]}

  output:
    commands:
      type: list
      description: "List of shell commands"
      items:
        type: str

metadata:
  description: "Extracts commands from generator output"
