spec: flatmachine
spec_version: "2.5.0"

data:
  name: flatmachine-manager
  context:
    task: "{{ input.task }}"
    working_dir: "{{ input.working_dir }}"
    db_path: "{{ input.db_path }}"
    human_approved: false

  agents:
    manager: ./agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: work

    work:
      agent: manager
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 60
        total_timeout: 600
      input:
        task: "{{ context.task }}"
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: human_review

    human_review:
      action: human_review
      transitions:
        - condition: "context.human_approved == true"
          to: done
        - to: work

    done:
      type: final
      output:
        result: "{{ context.result }}"

metadata:
  description: "FlatMachine CRUD manager — create, read, update, and validate flatmachines"
  tags: ["tool-use", "cli", "flatmachine-management", "crud"]
